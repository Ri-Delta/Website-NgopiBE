backend:
  name: git-gateway
  branch: main # Branch to update (optional; defaults to master)


media_folder: "assets/images" # Media files will be stored in the repo under this dir
public_folder: "assets/images" # The src attribute for uploaded media will begin with /assets/images

collections:
  - name: "members"
    label: "Members Data"
    files:
      - file: "assets/data/members.json"
        name: "member_list"
        label: "Daftar Member NgopiBE"
        description: "List of all members in the squad"
        fields:
          - name: "members"
            label: "Members"
            widget: "list"
            fields:
              - {label: "Nama", name: "name", widget: "string"}
              - {label: "IGN", name: "ign", widget: "string"}
              - {label: "Game Favorit", name: "game", widget: "string"}
              - {label: "Emoji", name: "emoji", widget: "string"}
              - {label: "Status Online?", name: "online", widget: "boolean", default: false}

  - name: "schedule"
    label: "Schedule Data"
    files:
      - file: "assets/data/schedule.json"
        name: "schedule_list"
        label: "Jadwal Mingguan NgopiBE"
        description: "Atur jadwal harian squad"
        fields:
          - name: "schedule"
            label: "Jadwal"
            widget: "list"
            fields:
              - {label: "Hari", name: "day", widget: "string"}
              - {label: "Singkatan Hari (3 Huruf)", name: "short", widget: "string"}
              - name: "events"
                label: "Kegiatan"
                widget: "list"
                fields:
                  - {label: "Jam (HH:MM)", name: "time", widget: "string"}
                  - {label: "Nama Kegiatan", name: "label", widget: "string"}
                  - label: "Tipe Kegiatan"
                    name: "type"
                    widget: "select"
                    options: ["gaming", "social", "coffee", "tournament"]
